name: iOS Build

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build unsigned iOS App
        env:
          CODE_SIGNING_ALLOWED: 'NO'
          CODE_SIGNING_REQUIRED: 'NO'
        run: flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: Package Payload to IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r MovieSwipe_iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieSwipe_iOS.ipa
          path: MovieSwipe_iOS.ipa
