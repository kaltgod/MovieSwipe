name: Build iOS for Sideloadly

on:
  workflow_dispatch: # Запуск вручную кнопкой в Actions

permissions:
  contents: write

jobs:
  build-ios:
    name: Create IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HUGGING_FACE_API_KEY: ${{ secrets.HUGGING_FACE_API_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "TMDB_API_KEY=$TMDB_API_KEY" >> .env
          echo "HUGGING_FACE_API_KEY=$HUGGING_FACE_API_KEY" >> .env

      - name: Build unsigned iOS App
        run: |
          # Allow this to fail on code signing, but it will compile App.framework
          flutter build ios --release --no-codesign || true
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY="" -quiet build

      - name: Prepare IPA for Sideloadly
        run: |
          mkdir Payload
          find . -type d -name "Runner.app" -exec cp -R {} Payload/ \;
          zip -r MovieSwipe_iOS.ipa Payload
          rm -rf Payload

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ github.run_number }}
          name: MovieSwipe iOS Build v${{ github.run_number }}
          files: MovieSwipe_iOS.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
